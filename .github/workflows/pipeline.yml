name: Data Pipeline Medallion

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Se ejecuta solo todas las noches a las 00:00
  workflow_dispatch: 
    inputs:
      tipo_carga:
        description: 'Selecciona el tipo de carga'
        required: true
        default: 'INCREMENTAL'
        type: choice
        options:
          - GLOBAL
          - INCREMENTAL

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Importante para que kagglehub pueda autenticarse
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_CONFIG_DIR }}
          # Captura lo que elijas en el botón o usa INCREMENTAL por defecto
          TIPO_CARGA: ${{ github.event.inputs.tipo_carga || 'INCREMENTAL' }}
        run: |
          python -m src.main

name: Data Pipeline Medallion

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Ejecución automática diaria a medianoche
  workflow_dispatch: 
    inputs:
      tipo_carga:
        description: 'Selecciona el tipo de carga'
        required: true
        default: 'INCREMENTAL'
        type: choice
        options:
          - GLOBAL
          - INCREMENTAL

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Pipeline Completo (Bronze + Silver)
        env:
          # Credenciales para Storage (Bronze)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Token para Kaggle
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_CONFIG_DIR }}
          # Variables de control
          TIPO_CARGA: ${{ github.event.inputs.tipo_carga || 'INCREMENTAL' }}
          # Credenciales para SQL (Silver) - RECIÉN AGREGADAS
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          python -m src.main
